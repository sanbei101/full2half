name: build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置Go环境
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true

      - run: go mod download

      - name: 运行单元测试
        run: go test -v .

      - name: 运行基准测试
        run: go test -v -bench=. -benchmem .

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置Go环境
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true

      - run: go mod download

      - name: 生成 PGO Profile
        run: go test -bench=. -benchtime=5s -cpuprofile=cpu.pprof .

      - name: 构建项目
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -pgo=cpu.pprof -o dist/full2half ./main.go

      - name: 上传构建产物
        uses: actions/upload-artifact@v7
        with:
          name: full2half
          path: ./dist/full2half

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release
          files: "**/full2half*"
          make_latest: true