name: build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置Go环境
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - run: go mod download

      - name: 构建项目
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/full2half ./main.go

      - name: 上传构建产物
        uses: actions/upload-artifact@v7
        with:
          name: full2half
          path: ./dist/full2half

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release
          files: "**/full2half*"
          make_latest: true